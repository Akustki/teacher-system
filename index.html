<!DOCTYPE html>

<html lang="zh-TW">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>新竹縣教師甄選志願分發系統</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
<style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #0a0f3f, #08235a);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }
        
        .header {
            text-align: center;
            padding: 30px;
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        
        h1 {
            font-size: 2.8rem;
            margin-bottom: 15px;
            color: #ffd54f;
            text-shadow: 0 0 20px rgba(255, 213, 79, 0.8);
            animation: title-glow 2s ease-in-out infinite alternate;
        }
        
        @keyframes title-glow {
            from { text-shadow: 0 0 15px rgba(255, 213, 79, 0.6); }
            to { text-shadow: 0 0 25px rgba(255, 213, 79, 0.9), 0 0 40px rgba(255, 213, 79, 0.6); }
        }
        
        .header-subtitle {
            font-size: 1.6rem;
            margin-bottom: 12px;
            color: #e0f7fa;
            font-weight: 300;
        }
        
        .category-switch {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .current-category {
            font-size: 1.2rem;
            color: #b3e5fc;
            font-weight: 600;
        }

        .category-buttons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
        }

        .category-button {
            padding: 10px 18px;
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.08);
            color: #e0f7fa;
            cursor: pointer;
            transition: all 0.25s;
            font-size: 0.95rem;
            min-width: 110px;
        }

        .category-button:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
        }

        .category-button.active {
            background: #ffd54f;
            color: #08235a;
            border-color: #ffd54f;
            box-shadow: 0 8px 20px rgba(255, 213, 79, 0.2);
        }

        .system-info {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        
        .info-card {
            background: rgba(255, 255, 255, 0.15);
            padding: 15px 25px;
            border-radius: 15px;
            min-width: 200px;
            text-align: center;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        
        .info-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 20px rgba(255, 213, 79, 0.4);
        }
        
        .info-card i {
            font-size: 2.5rem;
            margin-bottom: 15px;
            color: #ffd54f;
        }
        
        .info-card .value {
            font-size: 2.2rem;
            font-weight: bold;
            color: #ffd54f;
        }
        
        .info-card .label {
            font-size: 1.1rem;
            margin-top: 5px;
            color: #e0f7fa;
        }
        
        .container {
            display: flex;
            max-width: 1400px;
            margin: 0 auto;
            gap: 25px;
        }
        
        .current-section {
            flex: 1;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.15);
            position: relative;
            overflow: hidden;
        }
        
        .candidate-info {
            background: rgba(255, 255, 255, 0.15);
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            margin-bottom: 30px;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
            z-index: 2;
        }
        
        .candidate-info.giveup {
            background: rgba(255, 0, 0, 0.15);
            animation: giveup-pulse 2s infinite;
        }
        
        @keyframes giveup-pulse {
            0% { box-shadow: 0 0 0 rgba(255, 0, 0, 0.2); }
            50% { box-shadow: 0 0 20px rgba(255, 0, 0, 0.5); }
            100% { box-shadow: 0 0 0 rgba(255, 0, 0, 0.2); }
        }
        
        .candidate-info:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 20px rgba(255, 213, 79, 0.3);
        }
        
        .candidate-rank {
            font-size: 2.5rem;
            color: #ffd54f;
            margin-bottom: 15px;
        }
        
        .candidate-name {
            font-size: 2.2rem;
            margin: 10px 0;
            color: #e1f5fe;
        }
        
        .candidate-id {
            font-size: 1.5rem;
            color: #b3e5fc;
        }
        
        .schools-section {
            flex: 2;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        
        .section-title {
            font-size: 1.8rem;
            margin-bottom: 25px;
            color: #ffd54f;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .section-title i {
            font-size: 2rem;
        }
        
        .schools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            max-height: 500px;
            overflow-y: auto;
            padding: 10px;
        }
        
        .school-card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 25px 20px;
            transition: all 0.4s;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            overflow: hidden;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2);
            min-height: 120px;
            cursor: pointer;
            text-align: center;
        }
        
        .school-card:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        }
        
        .school-card.selected {
            background: rgba(76, 175, 80, 0.4);
            border: 2px solid #4caf50;
            box-shadow: 0 0 20px rgba(76, 175, 80, 0.6);
        }

        .school-card.assigned {
            background: rgba(76, 175, 80, 0.45);
            border: 2px solid #4caf50;
            box-shadow: 0 0 22px rgba(76, 175, 80, 0.8);
        }
        
        .school-card.unavailable {
            background: rgba(255, 0, 0, 0.15);
            cursor: not-allowed;
            opacity: 0.6;
        }
        
        /* 增強高閃效果 */
        .school-card.highlight {
            animation: highlight 3s ease;
        }
        
        @keyframes highlight {
            0% {
                box-shadow: 0 0 0 rgba(255, 255, 255, 0.8);
                transform: scale(1);
            }
            10% {
                box-shadow: 0 0 30px rgba(255, 255, 255, 0.9);
                transform: scale(1.05);
            }
            20% {
                box-shadow: 0 0 60px rgba(255, 255, 255, 1);
                transform: scale(1.1);
                background: rgba(255, 255, 255, 0.9);
            }
            40% {
                box-shadow: 0 0 90px rgba(255, 255, 255, 1);
                transform: scale(1.15);
                background: rgba(255, 255, 255, 1);
            }
            60% {
                box-shadow: 0 0 70px rgba(255, 255, 255, 0.9);
                transform: scale(1.1);
                background: rgba(255, 255, 255, 0.8);
            }
            80% {
                box-shadow: 0 0 40px rgba(255, 255, 255, 0.7);
                transform: scale(1.05);
                background: rgba(255, 255, 255, 0.6);
            }
            100% {
                box-shadow: 0 0 0 rgba(255, 255, 255, 0);
                transform: scale(1);
                background: rgba(19, 34, 32, 0.4);
            }
        }
        
        .school-name {
            font-size: 1.6rem;
            font-weight: bold;
            color: #e1f5fe;
            line-height: 1.4;
            position: relative;
            z-index: 2;
        }

        .school-vacancies {
            margin-top: 10px;
            font-size: 1rem;
            color: #ffd54f;
            opacity: 0.9;
        }
        
        .results-section {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            margin-top: 30px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.15);
            max-height: 500px;
            overflow-y: auto;
        }
        
        .results-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .results-table th {
            background: rgba(255, 213, 79, 0.3);
            padding: 15px;
            text-align: left;
            font-size: 1.2rem;
            color: #ffd54f;
            position: sticky;
            top: 0;
        }
        
        .results-table td {
            padding: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .results-table tr:last-child td {
            border-bottom: none;
        }
        
        .results-table tr.giveup-row {
            background: rgba(255, 0, 0, 0.1);
        }
        
        .results-table tr:hover {
            background: rgba(255, 255, 255, 0.1);
        }
        
        .controls {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin: 30px 0;
            flex-wrap: wrap;
        }
        
        button {
            padding: 18px 35px;
            font-size: 1.3rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            color: white;
            transition: all 0.3s;
            min-width: 200px;
            font-weight: bold;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            position: relative;
            overflow: hidden;
        }
        
        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: 0.5s;
        }
        
        button:hover::before {
            left: 100%;
        }
        
        #confirmBtn {
            background: linear-gradient(135deg, #0b6b10, #0b6b10);
        }
        
        #nextBtn {
            background: linear-gradient(135deg, #2962ff, #0039cb);
        }
        
        #giveUpBtn {
            background: linear-gradient(135deg, #ff5252, #b71c1c);
        }
        
        button:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
        }
        
        button:active {
            transform: translateY(-2px);
        }
        
        button:disabled {
            background: #757575;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
            opacity: 0.7;
        }
        
        .footer {
            text-align: center;
            padding: 30px;
            font-size: 1.1rem;
            color: #bbdefb;
            margin-top: 40px;
        }
        
        .highlight-text {
            color: #ffd54f;
            font-weight: bold;
        }
        
        /* 閃光效果 */
        .flash {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(255,255,255,1) 0%, rgba(255,255,255,0) 70%);
            animation: flash 3s ease;
            z-index: 10;
            border-radius: 20px;
            pointer-events: none;
        }
        
        .giveup-flash {
            background: radial-gradient(circle, rgba(255,0,0,0.8) 0%, rgba(255,0,0,0) 70%);
        }
        
        @keyframes flash {
            0% { opacity: 0; transform: scale(0.5); }
            20% { opacity: 1; transform: scale(1.2); }
            40% { opacity: 0.8; transform: scale(1.5); }
            70% { opacity: 0.4; transform: scale(1.8); }
            100% { opacity: 0; transform: scale(2); }
        }
        
        /* 恭喜動畫效果 */
        .congrats-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.5s;
        }
        
        .congrats-message {
            background: linear-gradient(135deg, rgba(76, 175, 80, 0.95), rgba(56, 142, 60, 0.95));
            color: #ffffff;
            padding: 40px 80px;
            border-radius: 20px;
            font-size: 3.5rem;
            font-weight: bold;
            box-shadow: 0 0 80px rgba(76, 175, 80, 0.8);
            text-align: center;
            position: relative;
            overflow: hidden;
            transform: scale(0.8);
            animation: congrats-animation 0.6s ease forwards;
            max-width: 90%;
            cursor: pointer;
        }
        
        @keyframes congrats-animation {
            0% {
                opacity: 0;
                transform: scale(0.1) rotate(-10deg);
            }
            20% {
                opacity: 1;
                transform: scale(1.1) rotate(2deg);
            }
            40% {
                transform: scale(1) rotate(0);
                box-shadow: 0 0 100px rgba(76, 175, 80, 1);
            }
            100% {
                opacity: 1;
                transform: scale(1) rotate(0);
            }
        }
        
        .congrats-icon {
            font-size: 5rem;
            margin-bottom: 30px;
            color: #ffd54f;
            text-shadow: 0 0 20px rgba(255, 213, 79, 0.8);
            animation: icon-pulse 2s infinite;
        }
        
        @keyframes icon-pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
        
        .congrats-school {
            font-size: 3.5rem;
            margin-top: 20px;
            color: #465DAA;
            text-shadow: none;
            animation: none;
        }

        .congrats-candidate {
            font-size: 3.5rem;
            color: #465DAA;
            margin: 20px 0;
            text-shadow: none;
            animation: none;
        }
        
        @keyframes text-glow {
            from { text-shadow: 0 0 10px rgba(255, 213, 79, 0.6); }
            to { text-shadow: 0 0 20px rgba(255, 213, 79, 0.9), 0 0 30px rgba(255, 213, 79, 0.8); }
        }
        
        .confetti {
            position: absolute;
            width: 15px;
            height: 15px;
            background-color: #f00;
            opacity: 0.7;
            animation: confetti-fall 5s linear forwards;
            z-index: -1;
        }
        
        @keyframes confetti-fall {
            0% {
                transform: translateY(-100px) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) rotate(720deg);
                opacity: 0;
            }
        }
        
        .warning-box {
            background: rgba(255, 152, 0, 0.2);
            border: 1px solid rgba(255, 152, 0, 0.5);
            border-radius: 10px;
            padding: 15px;
            margin-top: 20px;
            text-align: center;
        }
        
        /* 響應式設計 */
        @media (max-width: 1200px) {
            .container {
                flex-direction: column;
            }
            
            .schools-grid {
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            }
        }
        
        @media (max-width: 900px) {
            h1 {
                font-size: 2.2rem;
            }
            
            .header-subtitle {
                font-size: 1.3rem;
            }
            
            button {
                padding: 15px 25px;
                min-width: 180px;
                font-size: 1.2rem;
            }
            
            .candidate-name {
                font-size: 1.8rem;
            }
            
            .congrats-message {
                font-size: 2.5rem;
                padding: 30px 60px;
            }
            
            .congrats-candidate {
                font-size: 2.2rem;
            }
            
            .congrats-school {
                font-size: 2rem;
            }
        }
        
        @media (max-width: 600px) {
            .schools-grid {
                grid-template-columns: 1fr;
            }
            
            .system-info {
                gap: 15px;
            }
            
            .info-card {
                min-width: 160px;
                padding: 12px 15px;
            }
            
            .candidate-info {
                padding: 15px;
            }
            
            .controls {
                flex-direction: column;
                align-items: center;
            }
            
            .congrats-message {
                font-size: 2rem;
                padding: 25px 40px;
            }
            
            .congrats-icon {
                font-size: 4rem;
            }
            
            .congrats-candidate {
                font-size: 1.8rem;
            }
            
            .congrats-school {
                font-size: 1.8rem;
            }
        }
    
/* 滿版調整 */
body {
    margin: 0;
    padding: 0;
    overflow-x: hidden;
}

/* 頁首高度壓縮 */
.header {
    padding: 6px 20px !important;
    margin-bottom: 4px !important;
}

/* 統計卡片壓縮 */
.system-info {
    gap: 10px !important;
    padding: 6px 10px;
}
.info-card {
    min-width: 110px !important;
    padding: 6px 8px !important;
}
.info-card .value {
    font-size: 1.2rem !important;
}
.info-card .label {
    font-size: 0.85rem !important;
}

/* 可選學校顯示最佳化 */
.schools-grid {
    max-height: calc(100vh - 300px); /* 給出更大可視空間 */
    overflow-y: auto;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)) !important;
    gap: 8px !important;
    padding: 8px;
}
.school-card {
    min-height: 70px !important;
    padding: 10px 8px !important;
    font-size: 1rem;
}

/* 左側選填人員區塊壓縮並固定高度 */
.candidate-info {
    padding: 10px;
    font-size: 1rem;
}
.controls {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-top: 6px;
}
.controls button {
    font-size: 0.9rem;
    padding: 6px 10px;
}

.info-card {
    width: 100px;
    height: 100px;
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 4px;
    font-size: 14px;
    font-weight: bold;
    color: #ffd740;
}
.info-card i {
    font-size: 20px;
}
.system-info {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
}

.button-row {
    display: flex;
    gap: 12px;
}
</style>
</head>
<body>
<div class="header">
<h1><i class="fas fa-graduation-cap"></i> 新竹縣教師甄選志願分發系統</h1>
<div class="header-subtitle">正取人員志願選填系統 - 115學年度</div>
<div class="category-switch">
    <div class="current-category">目前類別：<span id="currentCategoryName">第一類</span></div>
    <div class="category-buttons" id="categoryButtons"></div>
</div>
<div class="system-info">
<div class="info-card">
<i class="fas fa-user-graduate"></i>
<div class="value" id="candidateCount">44</div>
<div class="label">正取人員</div>
</div>
<div class="info-card">
<i class="fas fa-school"></i>
<div class="value" id="schoolCount">44</div>
<div class="label">可選學校</div>
</div>
<div class="info-card">
<i class="fas fa-tasks"></i>
<div class="value" id="completedCount">0</div>
<div class="label">已完成選填</div>
</div>
<div class="info-card">
<i class="fas fa-user-times"></i>
<div class="value" id="giveupCount">0</div>
<div class="label">放棄選填</div>
</div>
<div class="controls">



</div><div class="button-row"><div class="info-card" id="confirmBtn">
<i class="fas fa-check"></i>
<div class="label">確認選擇</div>
</div><div class="info-card" id="giveUpBtn">
<i class="fas fa-times"></i>
<div class="label">放棄選填</div>
</div><div class="info-card" id="nextBtn">
<i class="fas fa-arrow-right"></i>
<div class="label">下一位</div>
</div></div></div>
</div>
<div class="container">
<div class="current-section" id="currentSection">
<div class="section-title">
<i class="fas fa-user"></i> 當前選填人員
            </div>
<div class="candidate-info" id="candidateInfo">
<div class="candidate-rank" id="currentRank">正取1</div>
<div class="candidate-name" id="currentName">鄧○心</div>
<div class="candidate-id">准考證: <span id="currentId">11301009</span></div>
</div>
<div class="section-title">
<i class="fas fa-check-circle"></i> 已選學校
            </div>
<div class="candidate-info">
<div class="candidate-name" id="selectedSchool">尚未選擇</div>
</div>
<div class="warning-box">
<i class="fas fa-exclamation-triangle"></i> 請注意：選擇"放棄"後將無法恢復操作
            </div>
</div>
<div class="schools-section">
<div class="section-title">
<i class="fas fa-map-marker-alt"></i> 請選擇志願學校
            </div>
<div class="schools-grid" id="schoolsGrid">
<!-- 學校卡片將由JavaScript動態生成 -->
</div>
</div>
</div>
<div class="results-section">
<div class="section-title">
<i class="fas fa-list"></i> 志願分發結果
        </div>
<button id="printCategoryBtn" style="
    display: none;
    margin-bottom: 20px;

        function createCategory(name) {
            const custom = categoryData[name] || {};
            const candidates = custom.candidates ? custom.candidates.map(candidate => ({ ...candidate })) : baseCandidates.map(candidate => ({ ...candidate }));
            const schools = custom.schools ? [...custom.schools] : [...baseSchools];
            const schoolVacancies = custom.schoolVacancies ? { ...custom.schoolVacancies } : schools.reduce((map, schoolName) => {
                map[schoolName] = (map[schoolName] || 0) + 1;
                return map;
            }, {});
            const availableSchools = Object.entries(schoolVacancies).map(([schoolName, vacancies]) => ({ name: schoolName, vacancies }));
            return { name, candidates, schools, schoolVacancies, availableSchools, currentIndex: 0 };
        }

            try {
                const saved = localStorage.getItem('teacherAssignmentData');

                const parsed = JSON.parse(saved);
                if (!Array.isArray(parsed)) return null;
                return parsed;
            } catch (error) {

            }

                selectedSchoolCard.classList.remove('selected');

            // 添加選中樣式
            card.classList.add('selected');
            
            // 更新選中的學校

            selectedSchoolObj = school;
            selectedSchoolCard = card;

            // 移除放棄狀態
            candidateInfo.classList.remove('giveup');
        }

            if (candidate.status === 'giveup') {
                selectedSchool.textContent = "已放棄選填";
                candidateInfo.classList.add('giveup');
            } else {
                selectedSchool.textContent = candidate.selectedSchool || "尚未選擇";
                candidateInfo.classList.remove('giveup');
            }
            
            // 更新統計信息
            candidateCount.textContent = getCurrentCandidates().length;
            schoolCount.textContent = getCurrentAvailableSchools().length;
            
            // 計算已完成人數和放棄人數
            const completed = getCurrentCandidates().filter(c => c.selectedSchool !== null).length;
            const giveup = getCurrentCandidates().filter(c => c.status === 'giveup').length;
            completedCount.textContent = completed;
            giveupCount.textContent = giveup;
        }

        // 更新結果表格
        function updateResultsTable() {
            resultsBody.innerHTML = '';
            getCurrentCandidates().forEach(candidate => {
                if (candidate.selectedSchool || candidate.status === 'giveup') {
                    const row = document.createElement('tr');
                    if (candidate.status === 'giveup') {
                        row.classList.add('giveup-row');
                    }
                    
                    row.innerHTML = `
                        <td>正取${candidate.id}</td>
                        <td>${candidate.name}</td>
                        <td>${candidate.examId}</td>
                        <td>${candidate.selectedSchool || "無"}</td>
                        <td>${candidate.status === 'giveup' ? 
                            '<span style="color: #ff5252;">已放棄</span>' : 
                            '<span style="color: #4caf50;">已分發</span>'}</td>
                    `;
                    resultsBody.appendChild(row);
                }
            });
        }

        let congratsConfettiTimeout = null;

        // 創建彩色紙屑效果
        function createConfetti() {
            const colors = ['#ff5252', '#ffd54f', '#4caf50', '#2962ff', '#9c27b0'];
            const container = document.getElementById('congratsContainer');
            
            for (let i = 0; i < 150; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.animationDelay = Math.random() * 5 + 's';
                container.appendChild(confetti);
            }
            
            // 動畫結束後清除紙屑
            congratsConfettiTimeout = setTimeout(() => {
                const confettiElements = document.querySelectorAll('.confetti');
                confettiElements.forEach(el => el.remove());
            }, 5000);
        }

        function hideCongratsAnimation() {
            congratsContainer.style.opacity = "0";
            congratsContainer.style.pointerEvents = "none";
            congratsContainer.onclick = null;
            const confettiElements = document.querySelectorAll('.confetti');
            confettiElements.forEach(el => el.remove());
            if (congratsConfettiTimeout) {
                clearTimeout(congratsConfettiTimeout);
                congratsConfettiTimeout = null;
            }
        }

        // 顯示恭喜動畫
        function showCongratsAnimation() {
            playRandomCheer();
            // 設置考生名字和學校名稱
            congratsCandidateName.textContent = getCurrentCandidates()[currentIndex].name;
            congratsSchoolName.textContent = selectedSchoolName;
            
            congratsContainer.style.opacity = "1";
            congratsContainer.style.pointerEvents = "auto";
            congratsContainer.onclick = hideCongratsAnimation;
            createConfetti();
        }

        // 確認選擇
        function confirmSelection() {
            const candidate = getCurrentCandidates()[currentIndex];
            const selectedSchoolText = selectedSchoolName;
            const printButton = document.getElementById("printNoticeButton");
            if (printButton) {
                printButton.style.display = "block";
                printButton.onclick = () => printReportNotice(candidate.name, selectedSchoolText);
            }
            if (!selectedSchoolName || !selectedSchoolCard || !selectedSchoolObj) return;
            
            // 顯示恭喜動畫
            showCongratsAnimation();
            
            // 將選中學校卡片變成亮綠色
            selectedSchoolCard.classList.add('assigned');
            
            // 3秒後執行選擇結果寫入並更新畫面
            setTimeout(() => {
                selectedSchoolCard.classList.remove('highlight');
                
                // 記錄選擇
                currentCategory.candidates[currentIndex].selectedSchool = selectedSchoolName;
                currentCategory.candidates[currentIndex].status = 'assigned';
                
                // 從可用學校中減少缺額
                const schoolIndex = currentCategory.availableSchools.findIndex(s => s.name === selectedSchoolName);
                if (schoolIndex !== -1) {
                    currentCategory.availableSchools[schoolIndex].vacancies -= 1;
                    if (currentCategory.availableSchools[schoolIndex].vacancies <= 0) {
                        currentCategory.availableSchools.splice(schoolIndex, 1);
                    }
                }
                
                // 新增：分發成功後儲存資料
                saveData();
                
                // 重置選擇
                selectedSchoolName = null;
                selectedSchoolObj = null;
                if (selectedSchoolCard) {
                    selectedSchoolCard.classList.remove('selected');
                    selectedSchoolCard.classList.remove('assigned');
                    selectedSchoolCard = null;
                }
                
                // 更新顯示
                initSchoolCards();
                updateCurrentCandidate();
                updateResultsTable();
                
                // 禁用確認按鈕
                confirmBtn.disabled = true;
                
                // 啟用下一步按鈕
                nextBtn.disabled = false;
            }, 3000);
        }

        // 放棄選填
        function giveUpSelection() {
            if (confirm("確定要放棄選填嗎？此操作不可撤銷！")) {
                // 添加紅色閃光效果
                const flashEffect = document.createElement('div');
                flashEffect.className = 'flash giveup-flash';
                currentSection.appendChild(flashEffect);
                
                // 添加放棄狀態樣式
                candidateInfo.classList.add('giveup');
                
                // 3秒後移除效果
                setTimeout(() => {
                    currentSection.removeChild(flashEffect);
                    
                    // 記錄放棄狀態
                    currentCategory.candidates[currentIndex].status = 'giveup';
                    currentCategory.candidates[currentIndex].selectedSchool = null;
                    
                    // 新增：放棄後儲存資料
                    saveData();
                    
                    // 更新顯示
                    selectedSchool.textContent = "已放棄選填";
                    updateCurrentCandidate();
                    updateResultsTable();
                    
                    // 禁用確認按鈕
                    confirmBtn.disabled = true;
                    
                    // 啟用下一步按鈕
                    nextBtn.disabled = false;
                    
                    // 清除選擇（如果有的話）
                    if (selectedSchoolCard) {
                        selectedSchoolCard.classList.remove('selected');
                        selectedSchoolCard = null;
                        selectedSchoolName = null;
                    }
                }, 3000);
            }
        }

        // 列印類別結果
        function printCategoryResults() {
            const categoryName = currentCategory.name;
            const candidates = getCurrentCandidates();
            
            // 組織表格資料
            let tableHTML = '<tr><th>序號</th><th>姓名</th><th>准考證號碼</th><th>分發學校</th><th>狀態</th></tr>';
            
            candidates.forEach(candidate => {
                if (candidate.selectedSchool || candidate.status === 'giveup') {
                    const status = candidate.status === 'giveup' ? '已放棄' : '已分發';
                    const school = candidate.selectedSchool || '無';
                    tableHTML += `
                        <tr>
                            <td>正取${candidate.id}</td>
                            <td>${candidate.name}</td>
                            <td>${candidate.examId}</td>
                            <td>${school}</td>
                            <td>${status}</td>
                        </tr>
                    `;
                }
            });
            
            // 統計資訊
            const completed = candidates.filter(c => c.selectedSchool !== null).length;
            const giveup = candidates.filter(c => c.status === 'giveup').length;
            
            const content = `
                <!DOCTYPE html>
                <html lang="zh-TW">
                <head>
                    <meta charset="utf-8"/>
                    <title>${categoryName} - 志願分發結果</title>
                    <style>
                        body {
                            font-family: 'Microsoft JhengHei', 標楷體, sans-serif;
                            color: #333;
                            background: white;
                            padding: 20px;
                            margin: 0;
                        }
                        .header {
                            text-align: center;
                            margin-bottom: 30px;
                            border-bottom: 2px solid #333;
                            padding-bottom: 15px;
                        }
                        h1 {
                            margin: 10px 0;
                            font-size: 24px;
                            color: #08235a;
                        }
                        h2 {
                            margin: 5px 0;
                            font-size: 18px;
                            color: #465DAA;
                        }
                        .category-name {
                            font-size: 20px;
                            font-weight: bold;
                            color: #0b6b10;
                            margin: 10px 0;
                        }
                        .print-date {
                            font-size: 12px;
                            color: #666;
                            margin-top: 10px;
                        }
                        .statistics {
                            margin: 20px 0;
                            padding: 15px;
                            background: #f5f5f5;
                            border-radius: 5px;
                            text-align: center;
                        }
                        .statistics p {
                            margin: 5px 0;
                            font-size: 14px;
                        }
                        table {
                            width: 100%;
                            border-collapse: collapse;
                            margin-top: 20px;
                        }
                        th {
                            background: #465DAA;
                            color: white;
                            padding: 12px;
                            text-align: left;
                            border: 1px solid #333;
                            font-weight: bold;
                        }
                        td {
                            padding: 10px 12px;
                            border: 1px solid #ccc;
                        }
                        tr:nth-child(even) {
                            background: #f9f9f9;
                        }
                        tr:hover {
                            background: #f0f0f0;
                        }
                        .status-completed {
                            color: #0b6b10;
                            font-weight: bold;
                        }
                        .status-giveup {
                            color: #d32f2f;
                            font-weight: bold;
                        }
                        .footer {
                            margin-top: 30px;
                            text-align: center;
                            border-top: 1px solid #ccc;
                            padding-top: 15px;
                            color: #666;
                            font-size: 12px;
                        }
                        @media print {
                            body { padding: 0; }
                            .header { margin-bottom: 20px; }
                        }
                    </style>
                </head>
                <body>
                    <div class="header">
                        <h1>新竹縣教師甄選志願分發系統</h1>
                        <h2>115學年度 - 志願分發結果</h2>
                        <div class="category-name">教師類別：${categoryName}</div>
                        <div class="print-date">列印時間：${new Date().toLocaleString('zh-TW')}</div>
                    </div>
                    
                    <div class="statistics">
                        <p><strong>總人數：${candidates.length}</strong></p>
                        <p><strong>已分發：${completed}</strong></p>
                        <p><strong>已放棄：${giveup}</strong></p>
                    </div>
                    
                    <table>
                        ${tableHTML}
                    </table>
                    
                    <div class="footer">
                        <p>此為系統自動生成的分發結果報表</p>
                        <p>新竹縣政府教育局 © 2026</p>
                    </div>
                </body>
                </html>
            `;
            
            // 開啟新視窗並列印
            const win = window.open('', '_blank');
            win.document.write(content);
            win.document.close();
            win.focus();
            setTimeout(() => win.print(), 500);
        }

        // 事件監聽
        confirmBtn.addEventListener('click', confirmSelection);
        giveUpBtn.addEventListener('click', giveUpSelection);
        nextBtn.addEventListener('click', nextCandidate);

        // 初始化
        renderCurrentCategory();
        initSchoolCards();
        updateCurrentCandidate();
        updateResultsTable();
    function printReportNotice(name, school) {
    const today = "中華民國 115 年 7 月 1 日";
    const content = `
        <div style='padding: 40px; font-family: 標楷體, DFKai-SB, sans-serif; color: black; background: white; width: 800px; margin: auto; border: 2px solid black;'>

            <p style='font-size: 20px; margin-top: 30px;'>
                <strong>${name}</strong> 君，經公開分發作業，已成功分發至本縣 <strong>${school}</strong>，生效日自 <strong>115年7月1日</strong> 起。<br/><br/>
                請貴校受理該君於 <strong>115年7月3日（星期五）下午4時前</strong> 報到，辦理學經歷正本之審查，並經校內教師評審委員會程序後始完成應聘手續，逾期未報到辦理審查應聘者視同棄權取消資格，不得提出任何異議。
            </p>
            <p style='margin-top: 40px; font-size: 18px; text-align:right;'>
                新竹縣國民小學暨幼兒園教師聯合甄選委員會<br/>
                ${today}
            </p>
        </div>
    `;
    const win = window.open("", "_blank", "width=4,height=4");
    win.document.write(`<!DOCTYPE html><html><head><title>報到通知書</title></head><body>${content}<button id="printNoticeButton" style="
    display: none;
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 9999;
    padding: 10px 16px;
    font-size: 16px;
    background-color: #fcd34d;

    cursor: pointer;
">🖨️ 列印報到通知書</button>
</body></html>`);
    win.document.close();
    win.focus();
    win.print();
}
